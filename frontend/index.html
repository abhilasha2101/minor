<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- SEO and Social Metadata -->
    <meta name="description" content="Veritas AI - Fact-check news claims in real-time with agentic AI and live web searches. Featuring daily current affairs, gamified quizzes, community boards, and custom news filters." />
    <meta property="og:title" content="Veritas AI — Real-time Agentic News Claim Verifier" />
    <meta property="og:description" content="Get instant verdicts, confidence levels, key findings, and sources verified by agentic AI." />
    <meta property="og:type" content="website" />
    
    <!-- Google Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=DM+Sans:ital,opsz,wght@0,9..40,100..1000;1,9..40,100..1000&family=Space+Mono:ital,wght@0,400;0,700;1,400;1,700&family=Syne:wght@400..800&display=swap" rel="stylesheet">
    
    <meta name="color-scheme" content="light dark">
    <script>
      (function() {
        try {
          const theme = localStorage.getItem('theme') || 'dark';
          document.documentElement.setAttribute('data-theme', theme);
          document.documentElement.style.colorScheme = theme;
        } catch (e) {}
      })();
    </script>
    
    <title>Veritas AI — Real-time News Verifier & Feed</title>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.jsx"></script>
  </body>
</html>
